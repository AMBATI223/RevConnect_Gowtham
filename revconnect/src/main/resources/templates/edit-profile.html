<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevConnect - Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />

</head>

<nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top py-2">
    <div class="container-fluid px-4">
        <a class="navbar-brand text-primary fw-bold fs-4" th:href="@{/}">RevConnect</a>
        <!-- Home Icon with Text -->
        <div class="ms-3 d-none d-lg-block">
            <a class="nav-link d-flex align-items-center" th:href="@{/}">
                <i class="bi bi-house-door fs-5 me-1"></i>
                <span class="fw-bold">Home</span>
            </a>
        </div>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item px-2">
                    <a class="nav-link" th:href="@{/users/search}" title="Search">
                        <i class="bi bi-search fs-5"></i><span class="d-lg-none ms-2">Search</span>
                    </a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link" th:href="@{/network/following}" title="Network">
                        <i class="bi bi-people fs-5"></i><span class="d-lg-none ms-2">Network</span>
                    </a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link position-relative" th:href="@{/messages}" title="Messages">
                        <i class="bi bi-chat-dots fs-5"></i>
                        <span th:if="${unreadMessageCount > 0}"
                            class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.6rem; padding: 0.25em 0.45em;" th:text="${unreadMessageCount}">0</span>
                        <span class="d-lg-none ms-2">Messages</span>
                    </a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link position-relative" th:href="@{/notifications}" title="Notifications">
                        <i class="bi bi-bell fs-5"></i>
                        <span th:if="${unreadNotificationCount > 0}"
                            class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                            th:text="${unreadNotificationCount}">0</span>
                        <span class="d-lg-none ms-2">Notifications</span>
                    </a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link d-flex align-items-center active" th:href="@{/users}">
                        <img th:src="${currentUser != null and currentUser.profilePictureUrl != null ? currentUser.profilePictureUrl : 'https://via.placeholder.com/32'}"
                            class="rounded-circle border border-primary"
                            style="width: 32px; height: 32px; object-fit: cover;">
                        <span class="ms-2 d-lg-none"
                            th:text="${currentUser != null ? currentUser.username : 'My Profile'}">Profile</span>
                    </a>
                </li>
                <li class="nav-item ms-lg-3">
                    <a class="btn btn-outline-danger btn-sm rounded-pill px-3" th:href="@{/logout}">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="text-center mb-4 text-primary">Edit Profile</h2>
            <form th:action="@{/users/edit}" th:object="${user}" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Profile Picture</label>
                    <div class="input-group">
                        <input type="file" name="profilePictureFile" class="form-control" accept="image/*" />
                    </div>
                    <div class="form-text mt-2">Or provide a URL below:</div>
                    <input type="text" th:field="*{profilePictureUrl}" class="form-control" placeholder="https://..." />
                </div>

                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <input type="text" th:field="*{bio}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" th:field="*{location}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Website</label>
                    <input type="text" th:field="*{website}" class="form-control" />
                </div>

                <!-- Privacy Settings -->
                <hr>
                <h4 class="mb-3">Privacy Settings</h4>
                <div class="mb-3 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="isPrivateProfile"
                        th:field="*{privateProfile}" />
                    <label class="form-check-label" for="isPrivateProfile">Private Profile (Only followers/connections
                        can see your posts)</label>
                </div>

                <!-- Notification Preferences -->
                <hr>

                <h4 class="mb-3">Notification Preferences</h4>
                <div class="mb-2 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefConnection"
                        th:field="*{prefConnectionRequests}" />
                    <label class="form-check-label" for="prefConnection">Connection Requests</label>
                </div>
                <div class="mb-2 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefLikes"
                        th:field="*{prefLikes}" />
                    <label class="form-check-label" for="prefLikes">Likes</label>
                </div>
                <div class="mb-2 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefComments"
                        th:field="*{prefComments}" />
                    <label class="form-check-label" for="prefComments">Comments</label>
                </div>
                <div class="mb-2 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefFollows"
                        th:field="*{prefFollows}" />
                    <label class="form-check-label" for="prefFollows">Follows</label>
                </div>
                <div class="mb-3 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefShares"
                        th:field="*{prefShares}" />
                    <label class="form-check-label" for="prefShares">Shares</label>
                </div>

                <!-- Business Fields -->
                <div th:if="${user.role != null and user.role.name() == 'BUSINESS'}">
                    <hr>
                    <h4 class="mb-3">Business Details</h4>
                    <div class="mb-3">
                        <label class="form-label">Business Name</label>
                        <input type="text" th:field="*{businessProfile.businessName}" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" th:field="*{businessProfile.category}" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" th:field="*{businessProfile.address}" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hours</label>
                        <input type="text" th:field="*{businessProfile.businessHours}" class="form-control" />
                    </div>
                </div>


                <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold shadow-sm">Save
                    Changes</button>
                <a th:href="@{/users}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
