<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevConnect - My Connections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.format(#dates.createNow(),'yyyyMMddHHmmss')})}" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-primary fw-bold fs-4" th:href="@{/}">RevConnect</a>
            <!-- Home Icon with Text -->
            <div class="ms-3 d-none d-lg-block">
                <a class="nav-link d-flex align-items-center" th:href="@{/}">
                    <i class="bi bi-house-door fs-5 me-1"></i>
                    <span class="fw-bold">Home</span>
                </a>
            </div>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/users/search}" title="Search">
                            <i class="bi bi-search fs-5"></i><span class="d-lg-none ms-2">Search</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link active" th:href="@{/network/following}" title="Network">
                            <i class="bi bi-people fs-5 text-primary"></i><span class="d-lg-none ms-2">Network</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative" th:href="@{/messages}" title="Messages">
                            <i class="bi bi-chat-dots fs-5"></i>
                            <span th:if="${unreadMessageCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadMessageCount}">0</span>
                            <span class="d-lg-none ms-2">Messages</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative" th:href="@{/notifications}" title="Notifications">
                            <i class="bi bi-bell fs-5"></i>
                            <span th:if="${unreadNotificationCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadNotificationCount}">0</span>
                            <span class="d-lg-none ms-2">Notifications</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link d-flex align-items-center" th:href="@{/users}">
                            <img th:src="${currentUser != null and currentUser.profilePictureUrl != null ? currentUser.profilePictureUrl : 'https://via.placeholder.com/32'}"
                                class="rounded-circle border" style="width: 32px; height: 32px; object-fit: cover;">
                            <span class="ms-2 d-lg-none"
                                th:text="${currentUser != null ? currentUser.username : 'My Profile'}">Profile</span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3" th:href="@{/logout}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; margin-top: 20px;">
        <h2>Following</h2>
        <div style="display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #eee;">
            <a th:href="@{/network/followers}" style="text-decoration: none; padding: 10px; color: gray;">Followers</a>
            <a th:href="@{/network/following}"
                style="text-decoration: none; padding: 10px; border-bottom: 2px solid var(--primary-color); font-weight: bold; color: var(--primary-color);">Following</a>
            <a th:href="@{/network/requests}" style="text-decoration: none; padding: 10px; color: gray;">Pending</a>
        </div>

        <div th:if="${following == null or following.empty}"
            style="padding: 30px; text-align: center; color: gray; background: white; border-radius: 8px;">
            You are not following anyone yet.
        </div>

        <div th:if="${following != null and !following.empty}">
            <div th:each="user : ${following}"
                style="display: flex; align-items: center; justify-content: space-between; padding: 15px; background: white; border-bottom: 1px solid #eee; border-radius: 8px; margin-bottom: 10px;">
                <div style="display: flex; align-items: center;">
                    <img th:src="${user.profilePictureUrl != null ? user.profilePictureUrl : 'https://via.placeholder.com/60'}"
                        style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 15px;">
                    <div>
                        <strong><a th:href="@{/users/profile/{username}(username=${user.username})}"
                                th:text="${user.username}"
                                style="text-decoration: none; color: black; font-size: 1.1em;">Username</a></strong>
                        <p th:text="${user.bio}" style="margin: 5px 0 0 0; font-size: 0.9em; color: gray;"></p>
                    </div>
                </div>
                <div>
                    <form th:action="@{/network/unfollow/{username}(username=${user.username})}" method="post"
                        style="margin:0;">
                        <button type="submit" class="btn btn-outline-danger btn-sm px-3 rounded-pill">Unfollow</button>

                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
