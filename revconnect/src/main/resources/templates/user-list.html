<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${title}">User List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-primary fw-bold fs-4" th:href="@{/}">RevConnect</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/users/search}"><i class="bi bi-search fs-5"></i></a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/users}">
                            <img th:src="${currentUser != null and currentUser.profilePictureUrl != null ? currentUser.profilePictureUrl : 'https://via.placeholder.com/32'}"
                                class="rounded-circle border" style="width: 32px; height: 32px; object-fit: cover;">
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex align-items-center mb-4">
            <a href="javascript:history.back()" class="btn btn-link text-decoration-none text-dark p-0 me-3">
                <i class="bi bi-chevron-left fs-4"></i>
            </a>
            <h2 class="h4 mb-0 fw-bold" th:text="${title}">User List</h2>
        </div>

        <div class="row g-3">
            <div th:each="u : ${users}" class="col-12">
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center">
                            <img th:src="${u.profilePictureUrl != null ? u.profilePictureUrl : 'https://via.placeholder.com/50'}"
                                class="rounded-circle me-3" style="width: 50px; height: 50px; object-fit: cover;">
                            <div class="flex-grow-1">
                                <h6 class="mb-0 fw-bold">
                                    <a th:href="@{/users/profile/{username}(username=${u.username})}"
                                        th:text="${u.username}" class="text-decoration-none text-dark">Username</a>
                                </h6>
                                <small class="text-muted"
                                    th:text="${u.bio != null ? u.bio : 'No bio available'}">Bio</small>
                            </div>
                            <div>
                                <a th:href="@{/users/profile/{username}(username=${u.username})}"
                                    class="btn btn-outline-primary btn-sm rounded-pill px-3">View Profile</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${users == null or users.empty}" class="col-12 text-center py-5">
                <i class="bi bi-people display-1 text-muted opacity-25"></i>
                <p class="mt-3 text-muted">No users found.</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
