<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevConnect - Search Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-primary fw-bold fs-4" th:href="@{/}">RevConnect</a>
            <!-- Home Icon with Text -->
            <div class="ms-3 d-none d-lg-block">
                <a class="nav-link d-flex align-items-center" th:href="@{/}">
                    <i class="bi bi-house-door fs-5 me-1"></i>
                    <span class="fw-bold">Home</span>
                </a>
            </div>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative active" th:href="@{/users/search}" title="Search">
                            <i class="bi bi-search fs-5 text-primary"></i>
                            <span class="d-lg-none ms-2">Search</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/network/following}" title="Network">
                            <i class="bi bi-people fs-5"></i><span class="d-lg-none ms-2">Network</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative" th:href="@{/messages}" title="Messages">
                            <i class="bi bi-chat-dots fs-5"></i>
                            <span th:if="${unreadMessageCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadMessageCount}">0</span>
                            <span class="d-lg-none ms-2">Messages</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative" th:href="@{/notifications}" title="Notifications">
                            <i class="bi bi-bell fs-5"></i>
                            <span th:if="${unreadNotificationCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadNotificationCount}">0</span>
                            <span class="d-lg-none ms-2">Notifications</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link d-flex align-items-center" th:href="@{/users}">
                            <img th:src="${currentUser != null and currentUser.profilePictureUrl != null ? currentUser.profilePictureUrl : 'https://via.placeholder.com/32'}"
                                class="rounded-circle border" style="width: 32px; height: 32px; object-fit: cover;">
                            <span class="ms-2 d-lg-none"
                                th:text="${currentUser != null ? currentUser.username : 'My Profile'}">Profile</span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3" th:href="@{/logout}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0 rounded-3 mb-4">
                    <div class="card-body p-4">
                        <h2 class="h4 mb-4 fw-bold text-center">Search</h2>
                        <form th:action="@{/users/search}" method="get" class="d-flex gap-2">
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-search text-muted"></i>
                                </span>
                                <input type="text" name="query" class="form-control border-start-0 py-2"
                                    placeholder="Search users or hashtags (e.g. #tech)..." th:value="${param.query}" />
                            </div>
                            <button type="submit" class="btn btn-primary px-4 rounded-pill">Search</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>


        <!-- User Results -->
        <div th:if="${users != null}" class="mt-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-people me-2"></i>User Results</h5>
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div th:each="user : ${users}" class="col">
                    <div class="card h-100 shadow-sm border-0 bg-white rounded-3 hover-lift">
                        <div class="card-body text-center p-4">
                            <div class="position-relative d-inline-block mb-3">
                                <img th:src="${user.profilePictureUrl != null ? user.profilePictureUrl : 'https://via.placeholder.com/100?text=Profile'}"
                                    alt="Profile Picture" class="rounded-circle border border-2 border-white shadow-sm"
                                    style="width: 80px; height: 80px; object-fit: cover;">
                            </div>
                            <h5 class="card-title mb-1 fw-bold">
                                <a th:href="@{/users/profile/{username}(username=${user.username})}"
                                    th:text="${user.username}" class="text-decoration-none text-dark">Username</a>
                            </h5>
                            <p class="text-muted small mb-4"
                                th:text="${user.bio != null ? user.bio : 'No bio available'}"
                                style="display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em;">
                                Bio goes here...
                            </p>

                            <div th:if="${user.username != currentUsername}">
                                <div
                                    th:if="${followingUsernames != null and followingUsernames.contains(user.username)}">
                                    <form th:action="@{/network/unfollow/{username}(username=${user.username})}"
                                        method="post">
                                        <button type="submit"
                                            class="btn btn-outline-primary btn-sm px-4 rounded-pill fw-semibold">
                                            Following
                                        </button>
                                    </form>
                                </div>
                                <div
                                    th:unless="${followingUsernames != null and followingUsernames.contains(user.username)}">
                                    <form th:action="@{/network/follow/{username}(username=${user.username})}"
                                        method="post">
                                        <button type="submit"
                                            class="btn btn-primary btn-sm px-4 rounded-pill shadow-sm fw-semibold">
                                            Follow
                                        </button>
                                    </form>
                                </div>
                            </div>
                            <div th:if="${user.username == currentUsername}">
                                <span class="badge bg-light text-muted py-2 px-3 rounded-pill border">You</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${users.empty}" class="text-center py-5 bg-white rounded-3 shadow-sm border mt-3">
                <i class="bi bi-person-slash display-1 text-muted opacity-25"></i>
                <p class="text-muted mt-3">No users found matching your search.</p>
            </div>
        </div>

        <!-- Post Results (Hashtags) -->
        <div th:if="${posts != null}" class="mt-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-hash me-2"></i>Post Results</h5>
            <div class="row g-4">
                <div th:each="post : ${posts}" class="col-md-6">
                    <div class="card h-100 shadow-sm border-0 rounded-3">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <img th:src="${post.author.profilePictureUrl != null ? post.author.profilePictureUrl : 'https://via.placeholder.com/32'}"
                                    class="rounded-circle me-2" style="width: 32px; height: 32px; object-fit: cover;">
                                <div>
                                    <a th:href="@{/users/profile/{username}(username=${post.author.username})}"
                                        class="fw-bold text-dark text-decoration-none small"
                                        th:text="${post.author.username}">User</a>
                                    <br><small class="text-muted"
                                        th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy')}"></small>
                                </div>
                            </div>
                            <p class="card-text small" th:text="${post.content}"
                                style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                            </p>
                            <div th:if="${post.mediaUrl}" class="mb-2 text-center">
                                <img th:src="@{${post.mediaUrl}}" class="rounded img-fluid"
                                    style="max-height: 150px; object-fit: contain;">
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top">
                                <div class="small text-muted">
                                    <span class="me-2">❤️ <span th:text="${post.likesCount}">0</span></span>
                                    <span>💬 <span th:text="${post.commentsCount}">0</span></span>
                                </div>
                                <a th:href="@{/posts/{id}(id=${post.id})}"
                                    class="btn btn-link btn-sm text-decoration-none">View Post</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${posts.empty}" class="text-center py-5 bg-white rounded-3 shadow-sm border mt-3">
                <i class="bi bi-search display-1 text-muted opacity-25"></i>
                <p class="text-muted mt-3">No posts found for this hashtag.</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
