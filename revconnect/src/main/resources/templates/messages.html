<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevConnect - Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>


<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-primary fw-bold fs-4" th:href="@{/}">RevConnect</a>
            <!-- Home Icon with Text -->
            <div class="ms-3 d-none d-lg-block">
                <a class="nav-link d-flex align-items-center" th:href="@{/}">
                    <i class="bi bi-house-door fs-5 me-1"></i>
                    <span class="fw-bold">Home</span>
                </a>
            </div>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/users/search}" title="Search">
                            <i class="bi bi-search fs-5"></i><span class="d-lg-none ms-2">Search</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/network/following}" title="Network">
                            <i class="bi bi-people fs-5"></i><span class="d-lg-none ms-2">Network</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative active" th:href="@{/messages}" title="Messages">
                            <i class="bi bi-chat-dots fs-5 text-primary"></i>
                            <span th:if="${unreadMessageCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadMessageCount}">0</span>
                            <span class="d-lg-none ms-2">Messages</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative" th:href="@{/notifications}" title="Notifications">
                            <i class="bi bi-bell fs-5"></i>
                            <span th:if="${unreadNotificationCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadNotificationCount}">0</span>
                            <span class="d-lg-none ms-2">Notifications</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link d-flex align-items-center" th:href="@{/users}">
                            <img th:src="${currentUser != null and currentUser.profilePictureUrl != null ? currentUser.profilePictureUrl : 'https://via.placeholder.com/32'}"
                                class="rounded-circle border" style="width: 32px; height: 32px; object-fit: cover;">
                            <span class="ms-2 d-lg-none"
                                th:text="${currentUser != null ? currentUser.username : 'My Profile'}">Profile</span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3" th:href="@{/logout}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 1000px; margin-top: 20px;">
        <div class="chat-container">
            <!-- Sidebar: Chat Partners -->
            <div class="chat-sidebar">

                <div style="padding: 15px; border-bottom: 1px solid #eee; background: white; font-weight: bold;">
                    Direct Messages
                </div>

                <div th:if="${chatPartners.empty}" style="padding: 20px; color: gray; text-align: center;">
                    No conversations yet. Start a chat from someone's profile!
                </div>

                <a th:each="partner : ${chatPartners}" th:href="@{/messages/{username}(username=${partner.username})}"
                    class="chat-partner-item"
                    th:classappend="${partnerUsername != null and partnerUsername == partner.username} ? 'active' : ''">

                    <img th:src="${partner.profilePictureUrl != null ? partner.profilePictureUrl : 'https://via.placeholder.com/40'}"
                        style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 15px;">
                    <div>
                        <strong th:text="${partner.username}">Username</strong>
                    </div>
                </a>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div th:if="${partnerUsername == null}"
                    style="flex-grow: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; color: gray;">
                    <div style="font-size: 3em; margin-bottom: 10px;">💬</div>
                    <h3>Your Messages</h3>
                    <p>Select a conversation or start a new one.</p>
                </div>

                <div th:if="${partnerUsername != null}" style="display: flex; flex-direction: column; height: 100%;">
                    <!-- Chat Header -->
                    <div style="padding: 15px; border-bottom: 1px solid #eee; background: white; font-weight: bold;">
                        Chatting with <a th:href="@{/users/profile/{username}(username=${partnerUsername})}"
                            th:text="${partnerUsername}"
                            style="color: var(--primary-color); text-decoration: none;">User</a>
                    </div>

                    <!-- Messages List -->
                    <div class="messages" id="messagesBox">
                        <div th:each="msg : ${conversation}" class="message-bubble"
                            th:classappend="${msg.sender.username == currentUser.username} ? 'sent' : 'received'">
                            <div th:text="${msg.content}">Message Content here</div>
                            <div style="font-size: 0.7em; margin-top: 5px; opacity: 0.8; text-align: right;"
                                th:text="${#temporals.format(msg.sentAt, 'HH:mm')}">Time</div>
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="chat-input-area">

                        <form th:action="@{/messages/{username}(username=${partnerUsername})}" method="post">
                            <input type="text" name="content" placeholder="Message..." required
                                style="flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
                            <button type="submit"
                                style="border-radius: 20px; padding: 10px 20px; margin: 0;">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-scroll to bottom of messages
        const messagesBox = document.getElementById("messagesBox");
        if (messagesBox) {
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
