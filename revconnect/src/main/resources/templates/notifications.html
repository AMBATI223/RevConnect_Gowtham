<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-primary fw-bold fs-4" th:href="@{/}">RevConnect</a>
            <!-- Home Icon with Text -->
            <div class="ms-3 d-none d-lg-block">
                <a class="nav-link d-flex align-items-center" th:href="@{/}">
                    <i class="bi bi-house-door fs-5 me-1"></i>
                    <span class="fw-bold">Home</span>
                </a>
            </div>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/users/search}" title="Search">
                            <i class="bi bi-search fs-5"></i><span class="d-lg-none ms-2">Search</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/network/following}" title="Network">
                            <i class="bi bi-people fs-5"></i><span class="d-lg-none ms-2">Network</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative" th:href="@{/messages}" title="Messages">
                            <i class="bi bi-chat-dots fs-5"></i>
                            <span th:if="${unreadMessageCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadMessageCount}">0</span>
                            <span class="d-lg-none ms-2">Messages</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link position-relative active" th:href="@{/notifications}" title="Notifications">
                            <i class="bi bi-bell fs-5 text-primary"></i>
                            <span th:if="${unreadNotificationCount > 0}"
                                class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.6rem; padding: 0.25em 0.45em;"
                                th:text="${unreadNotificationCount}">0</span>
                            <span class="d-lg-none ms-2">Notifications</span>
                        </a>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link d-flex align-items-center" th:href="@{/users}">
                            <img th:src="${currentUser != null and currentUser.profilePictureUrl != null ? currentUser.profilePictureUrl : 'https://via.placeholder.com/32'}"
                                class="rounded-circle border" style="width: 32px; height: 32px; object-fit: cover;">
                            <span class="ms-2 d-lg-none"
                                th:text="${currentUser != null ? currentUser.username : 'My Profile'}">Profile</span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3" th:href="@{/logout}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Unread Notifications</h2>
        <form th:action="@{/notifications/readAll}" method="post" class="mb-3">
            <button type="submit" class="btn btn-sm btn-primary">Mark All As Read</button>
        </form>
        <ul class="list-group mb-4">
            <li th:each="notif : ${unread}" class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong th:text="${notif.type}"></strong>: <span th:text="${notif.message}"></span>
                    <br />
                    <small class="text-muted"
                        th:text="${#temporals.format(notif.createdAt, 'dd-MM-yyyy HH:mm')}"></small>
                </div>
                <form th:action="@{/notifications/read/{id}(id=${notif.id})}" method="post">
                    <button type="submit" class="btn btn-sm btn-outline-success">Mark Read</button>
                </form>
            </li>
            <li th:if="${unread == null or unread.isEmpty()}" class="list-group-item text-center text-muted">No unread
                notifications.</li>
        </ul>

        <h2>All Notifications</h2>
        <ul class="list-group">
            <li th:each="notif : ${all}" class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong th:text="${notif.type}"></strong>: <span th:text="${notif.message}"></span>
                    <br />
                    <small class="text-muted"
                        th:text="${#temporals.format(notif.createdAt, 'dd-MM-yyyy HH:mm')}"></small>
                </div>
            </li>
            <li th:if="${all == null or all.isEmpty()}" class="list-group-item text-center text-muted">No notifications.
            </li>
        </ul>

        <h3 class="mt-4">Preferences</h3>
        <div class="row g-3">
            <div th:each="entry : ${preferences}" class="col-md-4">
                <form th:action="@{/notifications/preference}" method="post" class="d-flex align-items-end gap-2">
                    <div class="flex-grow-1">
                        <label th:for="${'pref_' + entry.key}" th:text="${entry.key}"></label>
                        <select name="enabled" th:id="${'pref_' + entry.key}" class="form-select">
                            <option th:value="true" th:selected="${entry.value}">Enabled</option>
                            <option th:value="false" th:selected="${!entry.value}">Disabled</option>
                        </select>
                    </div>
                    <input type="hidden" name="type" th:value="${entry.key}" />
                    <button type="submit" class="btn btn-sm btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
